services:
  - type: web
    name: financial-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GOOGLE_SHEET_ID
        value: 1gqj8SSDBcq7ZWHw4SK8DVYosLqaOQ6ovZzy1tWvQNRw
      - key: GOOGLE_SHEET_GID
        value: "0"
