name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: نشر على Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
            echo "✓ تم تشغيل النشر على Render"
          else
            echo "RENDER_DEPLOY_HOOK غير مُعدّ — تخطي (اربط Render بـ GitHub مباشرة)"
          fi
